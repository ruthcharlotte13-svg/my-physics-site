<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Google Docs</title>
    <link rel="icon" type="image/x-icon" href="https://ssl.gstatic.com/docs/documents/images/kix-favicon7.ico">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #fff; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <iframe 
        id="proxy-frame"
        src="https://eshaan2013-bolt-unblocker-web.hf.space" 
        sandbox="allow-forms allow-modals allow-popups allow-popups-to-escape-sandbox allow-scripts allow-same-origin"
    ></iframe>

    <script>
        // THE FIX: This prevents the "Inception" loop
        const frame = document.getElementById('proxy-frame');
        
        // This detects if the proxy is trying to reload the top page
        window.addEventListener('message', function(e) {
            if (e.data === 'reload') {
                console.log("Loop detected and stopped.");
                e.preventDefault();
            }
        });

        // This keeps the school filter from seeing the Hugging Face URL
        history.pushState(null, document.title, location.href);
        window.addEventListener('popstate', function (event) {
            history.pushState(null, document.title, location.href);
        });
    </script>
</body>
</html>
